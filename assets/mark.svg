<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="tickmarkr mark">
  <defs>
    <linearGradient id="tick" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="8">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0a0a12"/>
  <!-- chunky pixel tick: 2x2 blocks stepping 1 cell (connected ribbon), skewed -18 to match the wordmark -->
  <g transform="translate(123 112) skewX(-18) scale(36)">
    <g fill="#55387e" transform="translate(0.35 0.35)"><rect x="0" y="4" width="2" height="2"/><rect x="1" y="5" width="2" height="2"/><rect x="2" y="6" width="2" height="2"/><rect x="3" y="5" width="2" height="2"/><rect x="4" y="4" width="2" height="2"/><rect x="5" y="3" width="2" height="2"/><rect x="6" y="2" width="2" height="2"/><rect x="7" y="1" width="2" height="2"/><rect x="8" y="0" width="2" height="2"/></g>
    <g fill="url(#tick)"><rect x="0" y="4" width="2" height="2"/><rect x="1" y="5" width="2" height="2"/><rect x="2" y="6" width="2" height="2"/><rect x="3" y="5" width="2" height="2"/><rect x="4" y="4" width="2" height="2"/><rect x="5" y="3" width="2" height="2"/><rect x="6" y="2" width="2" height="2"/><rect x="7" y="1" width="2" height="2"/><rect x="8" y="0" width="2" height="2"/></g>
  </g>
</svg>
