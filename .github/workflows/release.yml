name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    # Publishes ONLY from the public repo — same guard as ci.public.yml. A tag pushed in the
    # private tickmarkr-dev repo skips this job entirely instead of attempting a doomed publish.
    if: github.repository == 'alzahrani-khalid/tickmarkr'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm publish --provenance --access public
