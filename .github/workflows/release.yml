name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
      # Publishing runs from this PUBLIC repository: --provenance binds the npm package to this
      # source and workflow via GitHub OIDC (trusted publishing).
      - run: npm publish --provenance --access public
